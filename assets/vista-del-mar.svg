<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1020" role="img" aria-label="Architectural rendering of Vista Del Mar Townhomes">
  <defs>
    <linearGradient id="vsky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e7e1d6"/>
      <stop offset="1" stop-color="#efeae1"/>
    </linearGradient>
    <linearGradient id="vsea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6a86a3"/>
      <stop offset="1" stop-color="#3c5f83"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="1020" fill="url(#vsky)"/>
  <!-- coastline -->
  <rect y="640" width="1200" height="120" fill="url(#vsea)" opacity="0.85"/>
  <path d="M0 648 Q300 636 600 648 T1200 648 V760 H0 Z" fill="#3c5f83" opacity="0.35"/>
  <!-- ground -->
  <rect y="758" width="1200" height="262" fill="#ded7c9"/>
  <!-- townhome terrace -->
  <g>
    <!-- row of stepped townhomes -->
    <g fill="#0e1f38">
      <rect x="120" y="470" width="180" height="330"/>
      <rect x="300" y="500" width="180" height="300"/>
      <rect x="480" y="440" width="180" height="360"/>
      <rect x="660" y="500" width="180" height="300"/>
      <rect x="840" y="470" width="180" height="330"/>
    </g>
    <!-- roofs / setbacks -->
    <g fill="#12274a">
      <rect x="120" y="452" width="180" height="22"/>
      <rect x="300" y="482" width="180" height="22"/>
      <rect x="480" y="422" width="180" height="22"/>
      <rect x="660" y="482" width="180" height="22"/>
      <rect x="840" y="452" width="180" height="22"/>
    </g>
    <!-- window grid -->
    <g fill="#e7e1d6" opacity="0.9">
      <g>
        <rect x="150" y="510" width="50" height="60"/><rect x="220" y="510" width="50" height="60"/>
        <rect x="150" y="600" width="50" height="60"/><rect x="220" y="600" width="50" height="60"/>
        <rect x="150" y="690" width="50" height="80"/><rect x="220" y="690" width="50" height="80"/>
      </g>
      <g>
        <rect x="330" y="540" width="50" height="60"/><rect x="400" y="540" width="50" height="60"/>
        <rect x="330" y="630" width="50" height="60"/><rect x="400" y="630" width="50" height="60"/>
        <rect x="330" y="720" width="50" height="60"/><rect x="400" y="720" width="50" height="60"/>
      </g>
      <g>
        <rect x="510" y="480" width="50" height="60"/><rect x="580" y="480" width="50" height="60"/>
        <rect x="510" y="570" width="50" height="60"/><rect x="580" y="570" width="50" height="60"/>
        <rect x="510" y="660" width="50" height="60"/><rect x="580" y="660" width="50" height="60"/>
        <rect x="510" y="750" width="50" height="40"/><rect x="580" y="750" width="50" height="40"/>
      </g>
      <g>
        <rect x="690" y="540" width="50" height="60"/><rect x="760" y="540" width="50" height="60"/>
        <rect x="690" y="630" width="50" height="60"/><rect x="760" y="630" width="50" height="60"/>
        <rect x="690" y="720" width="50" height="60"/><rect x="760" y="720" width="50" height="60"/>
      </g>
      <g>
        <rect x="870" y="510" width="50" height="60"/><rect x="940" y="510" width="50" height="60"/>
        <rect x="870" y="600" width="50" height="60"/><rect x="940" y="600" width="50" height="60"/>
        <rect x="870" y="690" width="50" height="80"/><rect x="940" y="690" width="50" height="80"/>
      </g>
    </g>
    <!-- steel-blue balconies -->
    <g fill="#3c5f83">
      <rect x="120" y="580" width="180" height="8"/>
      <rect x="480" y="550" width="180" height="8"/>
      <rect x="840" y="580" width="180" height="8"/>
    </g>
  </g>
  <!-- foreground planting line -->
  <g fill="#3c5f83" opacity="0.25">
    <circle cx="90" cy="800" r="34"/><circle cx="1080" cy="800" r="30"/><circle cx="1140" cy="810" r="24"/>
  </g>
</svg>
